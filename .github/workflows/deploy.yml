name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Add Go to PATH
        run: echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Build Go server
        run: |
          cd $GITHUB_WORKSPACE
          go build -o chess-server ./cmd/server

      - name: Deploy Go server
        run: |
          sudo systemctl stop chess-server || true
          cp chess-server /srv/chess-server/chess-server
          sudo systemctl start chess-server

      - name: Build Next.js frontend
        working-directory: web/chess
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Deploy Next.js frontend
        run: |
          sudo systemctl stop chess-web || true
          rsync -a --delete web/chess/.next/ /srv/chess-web/.next/
          rsync -a --delete web/chess/public/ /srv/chess-web/public/
          sudo systemctl start chess-web
