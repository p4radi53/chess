name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    environment: prod

    steps:
      - uses: actions/checkout@v6

      - name: Add Go to PATH
        run: echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Build Go server
        run: |
          cd $GITHUB_WORKSPACE
          go build -o chess-server ./cmd/server

      - name: Deploy Go server
        run: |
          sudo systemctl stop chess-server || true
          cp chess-server /srv/chess-server/chess-server
          sudo systemctl start chess-server

      - name: Build React frontend
        working-directory: web
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Deploy React frontend
        run: |
          rsync -a --delete web/dist/ /srv/chess-web/
