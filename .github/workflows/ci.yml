name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Format check
        run: make fmt-check-go

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          args: ./internal/... ./cmd/...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/chess/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web/chess

      - name: Format check
        run: make fmt-check-fe

      - name: Lint
        run: make lint-fe
